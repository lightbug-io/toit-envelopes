name: Build

on:
  push

jobs:
  build:
    strategy:
      matrix:
        variant:
          - esp32c6-standard
          - esp32c6-large-partitions
          - esp32c6-single-ota

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Toit build environment
        uses: ./toit/actions/setup-build
        with:
          toit-dir: toit
          esp32: true

      - name: Build envelope
        shell: bash
        run: |
          make init
          make envelope VARIANT=${{ matrix.variant }}

      - name: Upload envelope artifact
        uses: actions/upload-artifact@v4
        with:
          name: envelope-${{ matrix.variant }}
          path: dist/${{ matrix.variant }}.envelope
